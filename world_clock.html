*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --on:  #D4A400;
  --off: #181200;
  --bg:      #000;
  --bg-cell: #050505;
  --bg-hdr:  #080808;
  --border:  #151515;
  --dim:     #555;
  --muted:   #2e2e2e;
  --dst:     #4a9eff;
  --seg:     'DSEG7Bold', monospace;
  --ui:      'Courier New', Courier, monospace;
}

html, body { background:var(--bg); color:#ccc; font-family:var(--ui); min-height:100vh; }
body.fs { display:flex; flex-direction:column; }

/* ── CLOCK BODY — hidden until font confirmed loaded ── */
#clock-body { opacity:0; transition:opacity 0.15s ease; }
#clock-body.ready { opacity:1; }

/* ── TOOLBAR ── */
#toolbar { display:flex; justify-content:flex-end; align-items:center; padding:8px 16px; background:var(--bg); min-height:36px; }
.tbtn { background:transparent; border:none; color:#333; font-family:var(--ui); font-size:16px; padding:4px 6px; cursor:pointer; transition:color .15s; line-height:1; }
.tbtn:hover { color:var(--on); }
.tbtn.habit-open { color:var(--on); }

/* habit items sit inline in toolbar */
.habit-item { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
.habit-item:hover .h-name { color:#666; }
.h-sq { width:16px; height:16px; border:1.5px solid var(--on); background:transparent; flex-shrink:0; transition:background .12s; }
.h-sq.done { background:var(--on); }
.h-ci { width:16px; height:16px; border-radius:50%; border:1.5px solid var(--on); background:transparent; flex-shrink:0; transition:background .12s; }
.h-ci.done { background:var(--on); }
.h-dia { width:14px; height:14px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.h-name { font-size:8px; letter-spacing:2px; color:#444; text-transform:uppercase; font-family:var(--ui); transition:color .15s; }

/* ── CALCULATOR ── */
#calc-section { background:#060606; padding:14px 16px; }
#calc-display-wrap { border-bottom:1px solid #0f0f0f; margin-bottom:10px; padding-bottom:6px; }
#calc-expr { font-size:9px; color:#2a2a2a; text-align:right; letter-spacing:1px; min-height:14px; font-family:var(--ui); }
#calc-main { font-size:28px; color:var(--on); text-align:right; letter-spacing:2px; font-family:var(--seg); }
#calc-rate { font-size:8px; text-align:right; letter-spacing:1px; min-height:13px; margin-top:2px; font-family:var(--ui); color:#1a2a1a; }
#calc-rate.live   { color:#1e4a1e; }
#calc-rate.manual { color:#4a3a0a; }
#calc-rate-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
#calc-rate-lbl { font-size:8px; letter-spacing:2px; color:#2a2a2a; text-transform:uppercase; font-family:var(--ui); white-space:nowrap; }
#calc-rate-input { background:#0a0a0a; border:1px solid #1e1e1e; color:var(--on); font-family:var(--ui); font-size:12px; letter-spacing:2px; padding:6px 8px; border-radius:2px; width:80px; text-align:right; -webkit-appearance:none; appearance:none; }
#calc-rate-input:focus { outline:none; border-color:var(--on); }
#calc-rate-input::placeholder { color:#222; }
#calc-rate-badge { font-size:7px; letter-spacing:1px; padding:2px 6px; border-radius:2px; text-transform:uppercase; font-family:var(--ui); white-space:nowrap; border:1px solid; }
#calc-rate-badge.live   { color:#1e4a1e; border-color:#122a12; }
#calc-rate-badge.manual { color:#6a4a0a; border-color:#3a2a08; }
#calc-rate-clear { background:transparent; border:1px solid #1a1a1a; color:#2a2a2a; font-family:var(--ui); font-size:8px; letter-spacing:1px; padding:3px 7px; border-radius:2px; cursor:pointer; text-transform:uppercase; }
#calc-rate-clear:hover { border-color:#444; color:#555; }
#calc-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
.ck { background:#0a0a0a; border:1px solid #1a1a1a; color:#555; font-family:var(--ui); font-size:11px; letter-spacing:1px; padding:8px 4px; text-align:center; cursor:pointer; border-radius:2px; user-select:none; transition:color .1s, border-color .1s; }
.ck:hover { color:#888; border-color:#333; }
.ck.op  { color:var(--on); border-color:#2a2000; }
.ck.op:hover { border-color:var(--on); }
.ck.eq  { background:#140e00; border-color:var(--on); color:var(--on); }
.ck.zero { grid-column:span 2; }
.ck.clr { color:#8b2020; border-color:#2a0808; }
.ck.clr:hover { color:#c0392b; }
.ck.fx  { color:#3a7acc; border-color:#0a1830; font-size:9px; letter-spacing:0; }
.ck.fx:hover { border-color:#4a9eff; color:#4a9eff; }
.ck.span2 { grid-column:span 2; }

/* ── MAIN SECTION ── */
#main-section {
  text-align:center;
  min-height: calc(100dvh - 36px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: var(--bg-hdr);
  padding: 2rem 1.5rem;
}
#main-zone { font-size:11px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; margin-bottom:5px; }
#main-city { font-size:13px; letter-spacing:2px; color:#888; margin-bottom:18px; }

/* ── SEGMENT DISPLAY ── */
.seg-wrap { position:relative; display:inline-block; line-height:1; }
.seg-ghost {
  font-family: var(--seg);
  font-weight: bold;
  color: var(--off);
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
  user-select: none;
  z-index: 0;
  white-space: nowrap;
}
.seg-lit {
  font-family: var(--seg);
  font-weight: bold;
  color: var(--on);
  position: relative;
  z-index: 1;
  white-space: nowrap;
}
#main-ghost, #main-lit {
  font-size: clamp(52px, 11vw, 92px);
  letter-spacing: 5px;
  display: block;
}

#main-date { font-size:13px; color:var(--dim); margin-top:12px; letter-spacing:2px; }
#main-dst  { font-size:10px; color:var(--dst); margin-top:4px; letter-spacing:2px; min-height:14px; }
#ntp       { font-size:9px; color:#252525; margin-top:5px; letter-spacing:1px; transition:color .5s; }
#ntp.ok    { color:#1e3a1e; }
#ntp.err   { color:#3a1e1e; }
#ntp.sync  { color:#2a2a1a; }

/* ── GRID ── */
#grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(168px,1fr)); gap:1px; background:#0a0a0a; }
.cell { background:var(--bg-cell); padding:12px 14px; cursor:pointer; transition:background .12s; position:relative; }
.cell:hover { background:#0c0900; }
.cell.active { background:#0a0700; outline:1.5px solid var(--on); outline-offset:-1.5px; }
.cell.active::after { content:'▲ MAIN'; position:absolute; top:4px; right:8px; font-size:8px; color:var(--on); letter-spacing:1px; }
.cname { font-size:11px; color:#999; letter-spacing:1px; margin-bottom:1px; }
.czn   { font-size:9px;  color:var(--muted); letter-spacing:1px; margin-bottom:4px; }
.cdst  { font-size:8px;  color:var(--dst); letter-spacing:1px; min-height:10px; margin-bottom:2px; }
.wb    { font-size:8px;  color:#3a6a2a; letter-spacing:1px; margin-left:4px; }

/* Cell seg display */
.cell-seg-wrap { position:relative; display:inline-block; line-height:1; }
.cell-ghost, .cell-lit {
  font-family: var(--seg);
  font-weight: bold;
  font-size: 22px;
  letter-spacing: 2px;
  display: block;
  white-space: nowrap;
}
.cell-ghost {
  color: var(--off);
  position: absolute;

<script>
// ═══════════════════════════════════════════════════════
// ZONES
// ═══════════════════════════════════════════════════════
const ZONES = [
  {city:'Los Angeles', label:'PDT/PST',   tz:'America/Los_Angeles'},
  {city:'New York',    label:'EDT/EST',   tz:'America/New_York'},
  {city:'London',      label:'BST/GMT',   tz:'Europe/London'},
  {city:'Paris',       label:'CEST/CET',  tz:'Europe/Paris'},
  {city:'Dubai',       label:'GST',       tz:'Asia/Dubai'},
  {city:'Mumbai',      label:'IST',       tz:'Asia/Kolkata'},
  {city:'Bangkok',     label:'ICT',       tz:'Asia/Bangkok'},
  {city:'Beijing',     label:'CST',       tz:'Asia/Shanghai'},
  {city:'Seoul',       label:'KST',       tz:'Asia/Seoul'},
  {city:'Tokyo',       label:'JST',       tz:'Asia/Tokyo'},
  {city:'Sydney',      label:'AEDT/AEST', tz:'Australia/Sydney'},
  {city:'Auckland',    label:'NZDT/NZST', tz:'Pacific/Auckland'},
];

let mainTz = localStorage.getItem('wc_tz') || 'Asia/Tokyo';

// ═══════════════════════════════════════════════════════
// TIMEKEEPING — performance.now() + 5-sample NTP filter
// ═══════════════════════════════════════════════════════
let ntpOff = 0, perfBase = 0, dateBase = 0;
function nowMs() { return dateBase + (performance.now() - perfBase); }

async function fetchSample() {
  const t0 = performance.now(), d0 = Date.now();
  const res = await fetch('https://worldtimeapi.org/api/timezone/UTC');
  const t1 = performance.now();
  if (!res.ok) throw 0;
  const data = await res.json();
  return { offset: new Date(data.utc_datetime).getTime() - (d0 + (t1-t0)/2), rtt: t1-t0 };
}

async function ntpSync() {
  const el = document.getElementById('ntp');
  el.textContent = '◎ sampling ntp (7 probes)...'; el.className = 'sync';
  const samples = [];
  for (let i = 0; i < 7; i++) {
    try {
      samples.push(await fetchSample());
      el.textContent = `◎ sampling... ${i+1}/7`;
    } catch(e) {}
    if (i < 6) await new Promise(r => setTimeout(r, 200));
  }
  if (samples.length >= 2) {
    samples.sort((a,b) => a.rtt - b.rtt);
    const keep = samples.slice(0, Math.min(3, samples.length));
    ntpOff = keep.reduce((s,x) => s + x.offset, 0) / keep.length;
    perfBase = performance.now(); dateBase = Date.now() + ntpOff;
    el.textContent = `◆ ntp synced  ±${Math.round(keep[0].rtt/2)}ms  (${keep.length}/${samples.length} samples)`;
    el.className = 'ok';
  } else {
    perfBase = performance.now(); dateBase = Date.now();
    el.textContent = '○ ntp unavailable — using system clock'; el.className = 'err';
  }
  setTimeout(ntpSync, 5 * 60 * 1000);
}

function driftCheck() {
  if (Math.abs(nowMs() - (Date.now() + ntpOff)) > 50) {
    perfBase = performance.now(); dateBase = Date.now() + ntpOff;
  }
  setTimeout(driftCheck, 30 * 1000);
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function getOff(tz, d) {
  return Math.round((new Date(d.toLocaleString('en-US',{timeZone:tz})).getTime() - d.getTime()) / 60000);
}
function fmtOff(tz) {
  const m = getOff(tz, new Date(nowMs())), s = m>=0?'+':'-', a = Math.abs(m);
  return 'UTC' + s + Math.floor(a/60) + (a%60 ? ':' + String(a%60).padStart(2,'0') : '');
}
function isDST(tz) {
  const d = new Date(nowMs());
  const j = getOff(tz, new Date(d.getFullYear(),0,1));
  const u = getOff(tz, new Date(d.getFullYear(),6,1));
  return j !== u && getOff(tz, d) === Math.max(j, u);
}
function isWorkH(tz) {
  const h = parseInt(new Intl.DateTimeFormat('en-GB',{timeZone:tz,hour:'2-digit',hour12:false}).format(new Date(nowMs())));
  return h >= 9 && h < 18;
}
function fmtT(ms, tz) {
  return new Intl.DateTimeFormat('en-GB',{timeZone:tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date(ms));
}
function fmtD(ms, tz) {
  return new Intl.DateTimeFormat('en-GB',{timeZone:tz,weekday:'short',day:'2-digit',month:'short',year:'numeric'}).format(new Date(ms));
}

// ═══════════════════════════════════════════════════════
// BUILD GRID
// ═══════════════════════════════════════════════════════
function buildGrid() {
  const g = document.getElementById('grid'); g.innerHTML = '';
  ZONES.forEach(z => {
    const k = z.tz.replace(/\//g,'_');
    const cell = document.createElement('div');
    cell.className = 'cell' + (z.tz === mainTz ? ' active' : '');
    cell.id = 'cell-' + k;

    const nr = document.createElement('div'); nr.className = 'cname'; nr.textContent = z.city;
    const wb = document.createElement('span'); wb.className = 'wb'; wb.id = 'wb-'+k; nr.appendChild(wb);
    const zr = document.createElement('div'); zr.className = 'czn'; zr.id = 'lbl-'+k; zr.textContent = z.label;
    const dr = document.createElement('div'); dr.className = 'cdst'; dr.id = 'dst-'+k;

    const sw = document.createElement('div'); sw.className = 'cell-seg-wrap';
    const gh = document.createElement('span'); gh.className = 'cell-ghost'; gh.textContent = '88:88:88';
    const li = document.createElement('span'); li.className = 'cell-lit'; li.id = 't-'+k; li.textContent = '--:--:--';
    sw.appendChild(gh); sw.appendChild(li);

    const dt = document.createElement('div'); dt.className = 'cdate'; dt.id = 'dat-'+k;

    [nr,zr,dr,sw,dt].forEach(x => cell.appendChild(x));
    cell.addEventListener('click', () => setMain(z));
    g.appendChild(cell);
  });
}

function setMain(z) {
  mainTz = z.tz;
  localStorage.setItem('wc_tz', z.tz);
  document.getElementById('main-zone').textContent = z.label + ' — ' + fmtOff(z.tz);
  document.getElementById('main-city').textContent = z.city;
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
  document.getElementById('cell-' + z.tz.replace(/\//g,'_')).classList.add('active');
}

// ═══════════════════════════════════════════════════════
// HABIT TRACKER
// ═══════════════════════════════════════════════════════
let habitOpen = false;

function habitRender() {
  const today = new Date();
  const k = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  const all = JSON.parse(localStorage.getItem('wc_ht') || '{}');
  const day = all[k] || {};
  const sq  = document.getElementById('h-sq');
  const ci  = document.getElementById('h-ci');
  const tri = document.getElementById('h-tri-poly');
  const dia = document.getElementById('h-dia-poly');
  if (sq)  sq.classList.toggle('done',  !!day.focus);
  if (ci)  ci.classList.toggle('done',  !!day.breathe);
  if (tri) tri.setAttribute('fill',     day.exercise ? '#D4A400' : 'none');
  if (dia) dia.setAttribute('fill',     day.sleep    ? '#D4A400' : 'none');
  if (typeof htUpdateIcons === 'function') htUpdateIcons();
}

function toggleHabit(which) {
  const today = new Date();
  const k = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  const all = JSON.parse(localStorage.getItem('wc_ht') || '{}');
  if (!all[k]) all[k] = {};
  all[k][which] = !all[k][which];
  localStorage.setItem('wc_ht', JSON.stringify(all));
  habitRender();
  if (typeof htUpdateHeaders === 'function') htUpdateHeaders();
  if (typeof htCheckAllDone  === 'function') htCheckAllDone();
  if (typeof htRenderAll     === 'function') htRenderAll();
}

function toggleHabits() {
  habitOpen = !habitOpen;
  const inline = document.getElementById('habit-inline');
  const btn = document.getElementById('btnhabit');
  inline.style.display = habitOpen ? 'flex' : 'none';
  btn.classList.toggle('habit-open', habitOpen);
  if (habitOpen) habitRender();
}

setInterval(habitRender, 60000);

  document.getElementById('main-lit').textContent  = fmtT(ms, mainTz);
  document.getElementById('main-date').textContent = fmtD(ms, mainTz);
  document.getElementById('main-dst').textContent  = isDST(mainTz) ? '◆ DAYLIGHT SAVING TIME ACTIVE' : '';
  ZONES.forEach(z => {
    const k = z.tz.replace(/\//g,'_');
    document.getElementById('t-'   + k).textContent = fmtT(ms, z.tz);
    document.getElementById('dat-' + k).textContent = fmtD(ms, z.tz);
    document.getElementById('dst-' + k).textContent = isDST(z.tz) ? '◆ DST' : '';
    document.getElementById('lbl-' + k).textContent = z.label + '  ' + fmtOff(z.tz);

}
function sched() {
  tick();
  setTimeout(sched, 1000 - (nowMs() % 1000));
}

const sectionState = { pomo: true, zazen: true, grid: true, habits: true, calc: true };
function toggleSection(id) {
  sectionState[id] = !sectionState[id];
  const ids = { pomo:'pomo-wrap', zazen:'zazen-wrap', grid:'grid-wrap', habits:'habits-wrap', calc:'calc-wrap' };
  const heights = { pomo:'300px', zazen:'300px', grid:'2000px', habits:'2000px', calc:'600px' };
  const wrap = document.getElementById(ids[id]);
  const open = sectionState[id];
  if (open) {
    wrap.classList.remove('closed');
    wrap.style.maxHeight = heights[id];
    wrap.style.opacity = '1';
  } else {
    wrap.style.maxHeight = '0';
    wrap.style.opacity = '0';

  ['arr-'+id, 'arr-'+id+'2'].forEach(aid => {
    const el = document.getElementById(aid);
    if (el) el.classList.toggle('open', open);
  });
}

// ═══════════════════════════════════════════════════════
// POMODORO ENGINE
// ═══════════════════════════════════════════════════════
const POMO_WORK  = 25 * 60;
const POMO_SHORT =  5 * 60;
const POMO_LONG  = 15 * 60;

let pomoState    = 'idle';   // idle | running | paused
let pomoMode     = 'work';   // work | short | long
let pomoCycle    = 0;        // 0-3 completed work sessions
let pomoLeft     = POMO_WORK;
let pomoInterval = null;

function pomoModeLabel() {
  if (pomoMode === 'work')  return `work &nbsp;·&nbsp; session ${pomoCycle + 1} of 4`;
  if (pomoMode === 'short') return 'short break';
  return 'long break';
}

function pomoDuration() {
  if (pomoMode === 'work')  return POMO_WORK;
  if (pomoMode === 'short') return POMO_SHORT;
  return POMO_LONG;
}

function pomoFmt(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function pomoRenderDots() {
  const el = document.getElementById('pomo-dots');
  el.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const d = document.createElement('div');
    d.className = 'pdot' + (i < pomoCycle ? ' done' : '');
    el.appendChild(d);
  }
}

function pomoRender() {
  document.getElementById('pomo-lit').textContent = pomoFmt(pomoLeft);
  document.getElementById('pomo-header').innerHTML = pomoModeLabel();
  pomoRenderDots();
  const btn = document.getElementById('pbtn-start');
  if (pomoState === 'running') {
    btn.textContent = '⏸ pause'; btn.classList.add('active');
  } else {
    btn.textContent = '▶ start'; btn.classList.add('active');
  }
}

function pomoTick() {
  if (pomoLeft <= 0) {
    clearInterval(pomoInterval); pomoInterval = null;
    pomoState = 'idle';
    playGong();
    // Advance state — wait for user to press start
    if (pomoMode === 'work') {
      pomoCycle++;
      pomoMode = pomoCycle >= 4 ? 'long' : 'short';
      if (pomoCycle >= 4) pomoCycle = 0; // reset after long break cycle
    } else {
      pomoMode = 'work';
    }
    pomoLeft = pomoDuration();
    pomoRender();
    return;
  }
  pomoLeft--;
  pomoRender();
}

function pomoStart() {
  unlockAudio();
  if (pomoState === 'running') {
    // Pause
    clearInterval(pomoInterval); pomoInterval = null;
    pomoState = 'paused';
  } else {
    // Start fresh session or resume — gong only on fresh start
    if (pomoState === 'idle') playGong();
    pomoState = 'running';
    pomoInterval = setInterval(pomoTick, 1000);
  }
  pomoRender();
}

function pomoReset() {
  unlockAudio();
  clearInterval(pomoInterval); pomoInterval = null;
  pomoState = 'idle';
  pomoMode  = 'work';
  pomoCycle = 0;
  pomoLeft  = POMO_WORK;
  pomoRender();
}

function pomoSkip() {
  unlockAudio();
  clearInterval(pomoInterval); pomoInterval = null;
  pomoState = 'idle';
  if (pomoMode === 'work') {
    pomoCycle = Math.min(pomoCycle + 1, 4);
    pomoMode = pomoCycle >= 4 ? 'long' : 'short';
    if (pomoCycle >= 4) pomoCycle = 0;
  } else {
    pomoMode = 'work';
  }
  pomoLeft = pomoDuration();
  playGong();
  pomoRender();
}

// iOS Safari locks each <audio> element individually until it has been
// explicitly played (even silently) during a synchronous user gesture.
// Fix: on the very first tap anywhere, play+pause at volume 0 to unlock it.
let _gongUnlocked = false;
function _unlockGong() {
  if (_gongUnlocked) return;
  _gongUnlocked = true;
  try {
    _gongAudio.volume = 0;
    const p = _gongAudio.play();
    if (p && p.then) p.then(() => { _gongAudio.pause(); _gongAudio.currentTime = 0; _gongAudio.volume = 1; }).catch(() => {});
  } catch(e) {}
}
document.addEventListener('touchend', _unlockGong, { once: true, passive: true });
document.addEventListener('click',    _unlockGong, { once: true, passive: true });

function unlockAudio() { /* no-op: kept so button handlers compile */ }

function playGong() {
  try {
    _gongAudio.currentTime = 0;
    _gongAudio.volume = 1;
    _gongAudio.play().catch(() => {});
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════
// ZAZEN ENGINE
// ═══════════════════════════════════════════════════════
let zazenMins     = 5;
let zazenLeft     = 5 * 60;
let zazenState    = 'idle';   // idle | running | paused
let zazenInterval = null;
let zazenCustomMode = false;

function zazenSetPreset(mins) {
  zazenMins = mins; zazenLeft = mins * 60; zazenCustomMode = false;
  document.querySelectorAll('.zpre').forEach(b => {
    b.classList.remove('zsel');
    if (b.textContent.trim() === String(mins)) b.classList.add('zsel');
  });
  document.getElementById('zazen-custom-input').classList.remove('visible');
  document.getElementById('zazen-custom-unit').classList.remove('visible');
  zazenRenderIdle();
}

function zazenSetCustom() {
  zazenCustomMode = true;
  document.querySelectorAll('.zpre').forEach(b => b.classList.remove('zsel'));
  document.getElementById('zpre-custom').classList.add('zsel');
  const inp = document.getElementById('zazen-custom-input');
  inp.classList.add('visible');
  inp.value = zazenMins;
  document.getElementById('zazen-custom-unit').classList.add('visible');
  inp.focus();
}

function zazenCustomChange(val) {
  const v = parseInt(val);
  if (v > 0 && v <= 999) { zazenMins = v; zazenLeft = v * 60; }
}

function zazenFmt(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function zazenRenderIdle() {
  // Nothing dynamic needed — idle state is always reset to full duration
}

function zazenBegin() {
  unlockAudio();
  // Read custom input value if in custom mode
  if (zazenCustomMode) {
    const v = parseInt(document.getElementById('zazen-custom-input').value);
    if (v > 0 && v <= 999) { zazenMins = v; zazenLeft = v * 60; }
  }
  document.getElementById('zazen-idle').style.display = 'none';
  document.getElementById('zazen-running').style.display = 'block';
  document.getElementById('zazen-header').textContent = 'meditation timer · ' + zazenMins + ' min';
  document.getElementById('zazen-lit').textContent = zazenFmt(zazenLeft);
  zazenState = 'running';
  playGong();
  zazenInterval = setInterval(zazenTick, 1000);
  // Expand wrap height to fit running state
  document.getElementById('zazen-wrap').style.maxHeight = '260px';
}

function zazenTick() {
  if (zazenLeft <= 0) {
    clearInterval(zazenInterval); zazenInterval = null;
    zazenState = 'idle';
    document.getElementById('zazen-lit').textContent = '00:00';
    playGong();
    return;
  }
  zazenLeft--;
  document.getElementById('zazen-lit').textContent = zazenFmt(zazenLeft);
}

function zazenPause() {
  if (zazenState === 'running') {
    clearInterval(zazenInterval); zazenInterval = null;
    zazenState = 'paused';
    document.getElementById('zbtn-pause').textContent = '▶ resume';
  } else {
    zazenState = 'running';
    zazenInterval = setInterval(zazenTick, 1000);
    document.getElementById('zbtn-pause').textContent = '⏸ pause';
  }
}

function zazenReset() {
  unlockAudio();
  clearInterval(zazenInterval); zazenInterval = null;
  zazenState = 'idle';
  zazenLeft = zazenMins * 60;
  document.getElementById('zazen-running').style.display = 'none';
  document.getElementById('zazen-idle').style.display = 'block';
  document.getElementById('zazen-header').textContent = 'meditation timer';
  document.getElementById('zbtn-pause').textContent = '⏸ pause';
  document.getElementById('zazen-wrap').style.maxHeight = '300px';
}

// ═══════════════════════════════════════════════════════
// CALCULATOR ENGINE
// ═══════════════════════════════════════════════════════
let calcVal  = '0';    // current display value
let calcPrev = null;   // previous operand
let calcOper = null;   // pending operator
let calcFresh = false; // next digit replaces display

let _fxRate = null;    // cached live USD/JPY rate

async function fxFetch() {
  try {
    const r = await fetch('https://api.frankfurter.app/latest?from=USD&to=JPY');
    const d = await r.json();
    _fxRate = d.rates.JPY;
  } catch(e) { _fxRate = null; }
}
fxFetch();

function calcDisp() { document.getElementById('calc-main').textContent = calcVal; }

function calcNum(n) {
  if (calcFresh) { calcVal = n; calcFresh = false; }
  else calcVal = calcVal === '0' ? n : calcVal + n;
  calcDisp();
}

function calcDot() {
  if (calcFresh) { calcVal = '0.'; calcFresh = false; }
  else if (!calcVal.includes('.')) calcVal += '.';
  calcDisp();
}

function calcOp(op) {
  calcPrev = parseFloat(calcVal);
  calcOper = op;
  calcFresh = true;
  document.getElementById('calc-expr').textContent = calcVal + ' ' + op;
}

function calcEq() {
  if (calcOper === null || calcPrev === null) return;
  const a = calcPrev, b = parseFloat(calcVal);
  let res;
  if (calcOper === '+') res = a + b;
  else if (calcOper === '−') res = a - b;
  else if (calcOper === '×') res = a * b;
  else if (calcOper === '÷') res = b !== 0 ? a / b : 'ERR';
  document.getElementById('calc-expr').textContent = a + ' ' + calcOper + ' ' + b + ' =';
  calcVal = res === 'ERR' ? 'ERR' : String(parseFloat(res.toFixed(8)));
  calcDisp();
  calcOper = null; calcPrev = null; calcFresh = true;
}

function calcAC() {
  calcVal = '0'; calcPrev = null; calcOper = null; calcFresh = false;
  document.getElementById('calc-expr').textContent = ' ';
  document.getElementById('calc-rate').textContent = ' ';
  document.getElementById('calc-rate').className = '';
  calcDisp();
}

function calcSign() {
  if (calcVal === '0' || calcVal === 'ERR') return;
  calcVal = calcVal.startsWith('-') ? calcVal.slice(1) : '-' + calcVal;
  calcDisp();
}

function calcPct() {
  const v = parseFloat(calcVal);
  calcVal = String(parseFloat((v / 100).toFixed(10)));
  calcDisp();
}

function calcRateInput() {
  const v = document.getElementById('calc-rate-input').value.trim();
  const badge = document.getElementById('calc-rate-badge');
  if (v && parseFloat(v) > 0) {
    badge.textContent = 'manual'; badge.className = 'manual';
  } else {
    badge.textContent = 'live'; badge.className = 'live';
  }
}

function calcRateClear() {
  document.getElementById('calc-rate-input').value = '';
  const badge = document.getElementById('calc-rate-badge');
  badge.textContent = 'live'; badge.className = 'live';
}

function calcGetRate() {
  const raw = document.getElementById('calc-rate-input').value.trim().replace(/[^0-9.]/g,'');
  const override = parseFloat(raw);
  if (override > 0) return { rate: override, source: 'manual override' };
  if (_fxRate)      return { rate: _fxRate,   source: 'live frankfurter.app' };
  return null;
}

async function calcFx(dir) {
  if (!_fxRate) await fxFetch();
  const rv = calcGetRate();
  if (!rv) {
    document.getElementById('calc-rate').textContent = 'rate unavailable — check connection';
    document.getElementById('calc-rate').className = '';
    return;
  }
  const v = parseFloat(calcVal.replace(/[^0-9.-]/g, ''));
  if (isNaN(v)) return;
  const { rate, source } = rv;
  let res, expr, rateLabel;
  if (dir === 'jpy2usd') {
    res = (v / rate).toFixed(2);
    expr = '¥' + v.toLocaleString() + ' ÷ ' + rate.toFixed(2);
    calcVal = '$' + res;
    rateLabel = 'USD/JPY ' + rate.toFixed(2) + '  ·  ' + source;
  } else {
    res = Math.round(v * rate);
    expr = '$' + v + ' × ' + rate.toFixed(2);
    calcVal = '¥' + res.toLocaleString();
    rateLabel = 'USD/JPY ' + rate.toFixed(2) + '  ·  ' + source;
  }
  document.getElementById('calc-expr').textContent = expr;
  document.getElementById('calc-main').textContent = calcVal;
  const rl = document.getElementById('calc-rate');
  rl.textContent = rateLabel;
  rl.className = source.includes('manual') ? 'manual' : 'live';
  calcFresh = true;
}

// ═══════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════
// CALCULATOR KEYBOARD HANDLER
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', function(e) {
  const calcWrap = document.getElementById('calc-wrap');
  const rateInput = document.getElementById('calc-rate-input');
  if (!calcWrap) return;
  const st = calcWrap.style.maxHeight;
  if (st === '0px' || st === '0' || calcWrap.classList.contains('closed')) return;
  if (document.activeElement === rateInput) return;
  const key = e.key;
  if (key >= '0' && key <= '9')         { e.preventDefault(); calcNum(key); }
  else if (key === '.')                  { e.preventDefault(); calcDot(); }
  else if (key === '+')                  { e.preventDefault(); calcOp('+'); }
  else if (key === '-')                  { e.preventDefault(); calcOp('−'); }
  else if (key === '*')                  { e.preventDefault(); calcOp('×'); }
  else if (key === '/')                  { e.preventDefault(); calcOp('÷'); }
  else if (key === 'Enter' || key === '='){ e.preventDefault(); calcEq(); }
  else if (key === 'Backspace')          { e.preventDefault(); calcBackspace(); }
  else if (key === 'Escape')             { e.preventDefault(); calcAC(); }
  else if (key === '%')                  { e.preventDefault(); calcPct(); }
});

function calcBackspace() {
  if (calcFresh || calcVal === '0' || calcVal === 'ERR') return;
  calcVal = calcVal.length > 1 ? calcVal.slice(0, -1) : '0';
  calcDisp();
}

let _clockUnlocked = false;
function _unlockClock() {
  if (_clockUnlocked) return;
  _clockUnlocked = true;
  try {
    _clockAudio.volume = 0;
    const p = _clockAudio.play();
    if (p && p.then) p.then(() => { _clockAudio.pause(); _clockAudio.currentTime = 0; _clockAudio.volume = 1; }).catch(() => {});
  } catch(e) {}
}
document.addEventListener('touchend', _unlockClock, { once: true, passive: true });
document.addEventListener('click',    _unlockClock, { once: true, passive: true });

function playClockEffect() {
  try {
    _clockAudio.currentTime = 0;
    _clockAudio.volume = 1;
    _clockAudio.play().catch(() => {});
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════
// HABIT TRACKER ENGINE — Option B rows
// ═══════════════════════════════════════════════════════
const HT_HABITS = ['focus','breathe','exercise','sleep'];
const HT_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const HT_LABELS = { focus:'Focus', breathe:'Breathe', exercise:'Exercise', sleep:'Sleep' };

const _htToday = new Date();
const _htTOD   = _htToday.getDate();
const _htTOM   = _htToday.getMonth();
const _htTOY   = _htToday.getFullYear();
let _htCalMo   = _htTOM;
let _htCalYr   = _htTOY;
let _htAllDonePlayed = false;
const _htOpenRows = {};

function htKey(yr, mo, day) {
  return yr + '-' + String(mo+1).padStart(2,'0') + '-' + String(day).padStart(2,'0');
}
function htLoadAll() {
  try { return JSON.parse(localStorage.getItem('wc_ht') || '{}'); } catch(e) { return {}; }
}
function htSaveAll(data) {
  try { localStorage.setItem('wc_ht', JSON.stringify(data)); } catch(e) {}
}

function htCalcStreak(habit) {
  const all = htLoadAll();
  let s = 0;
  const cur = new Date(_htTOY, _htTOM, _htTOD);
  while (true) {
    const k = htKey(cur.getFullYear(), cur.getMonth(), cur.getDate());
    if (all[k] && all[k][habit]) { s++; cur.setDate(cur.getDate()-1); }
    else break;
    if (s > 3650) break;
  }
  return s;
}

function htCalcBest(habit) {
  const all = htLoadAll();
  const keys = Object.keys(all).sort();
  let best=0, cur=0, prev=null;
  keys.forEach(k => {
    if (all[k] && all[k][habit]) {
      if (prev) { const diff=(new Date(k)-new Date(prev))/86400000; cur=diff===1?cur+1:1; }
      else cur=1;
      if (cur>best) best=cur;
      prev=k;
    } else { cur=0; prev=null; }
  });
  const live = htCalcStreak(habit);
  return Math.max(best, live);
}

function htCalcPct(habit) {
  const all = htLoadAll();
  const daysInMo = new Date(_htTOY, _htTOM+1, 0).getDate();
  const days = Math.min(_htTOD, daysInMo);
  let done=0;
  for (let d=1; d<=days; d++) {
    const k = htKey(_htTOY, _htTOM, d);
    if (all[k] && all[k][habit]) done++;
  }
  return Math.round((done/days)*100);
}

function htMakeIcon(habit) {
  if (habit==='focus')
    return '<div class="ht-icon-sq" id="htico-focus"></div>';
  if (habit==='breathe')
    return '<div class="ht-icon-ci" id="htico-breathe"></div>';
  if (habit==='exercise')
    return '<svg id="htico-exercise" width="13" height="12" viewBox="0 0 13 12" style="overflow:visible"><polygon id="htico-exercise-p" points="6.5,1 12,11 1,11" fill="none" stroke="#D4A400" stroke-width="1.5"/></svg>';
  if (habit==='sleep')
    return '<svg id="htico-sleep" width="13" height="13" viewBox="0 0 13 13" style="overflow:visible"><polygon id="htico-sleep-p" points="6.5,1 12,6.5 6.5,12 1,6.5" fill="none" stroke="#D4A400" stroke-width="1.5"/></svg>';
}

function htBuildDots(habit) {
  const all  = htLoadAll();
  const daysInMo = new Date(_htTOY, _htTOM+1, 0).getDate();
  let html = '';
  for (let d=1; d<=daysInMo; d++) {
    // week gap every 7 days starting from 1
    if (d>1 && (d-1)%7===0) html += '<div class="ht-week-gap"></div>';
    const isToday  = d===_htTOD;
    const isFuture = d>_htTOD;
    const k = htKey(_htTOY, _htTOM, d);
    const done = all[k] && all[k][habit];
    let cls = 'ht-dot';
    if (done)    cls += ' done';
    if (isToday) cls += ' ht-today-dot';
    if (isFuture) cls += ' ht-future-dot';
    html += '<div class="'+cls+'" data-day="'+d+'" data-habit="'+habit+'"></div>';
  }
  return html;
}

function htBuildCal(habit) {
  const all = htLoadAll();
  const daysInMo = new Date(_htCalYr, _htCalMo+1, 0).getDate();
  const firstDow = (new Date(_htCalYr, _htCalMo, 1).getDay()+6)%7;
  const isCurMo  = _htCalYr===_htTOY && _htCalMo===_htTOM;
  let html = '<div class="ht-cal-nav">'
    + '<button class="ht-cal-btn" onclick="htCalMonth(-1);event.stopPropagation()">&#8249;</button>'
    + '<span class="ht-cal-month">'+HT_MONTHS[_htCalMo]+' '+_htCalYr+'</span>'
    + '<button class="ht-cal-btn" onclick="htCalMonth(1);event.stopPropagation()">&#8250;</button>'
    + '</div><div class="ht-cal-grid">';
  ['M','T','W','T','F','S','S'].forEach(d => html += '<div class="ht-cal-dow">'+d+'</div>');
  for (let i=0; i<firstDow; i++) html += '<div class="ht-cal-day ht-cal-empty"></div>';
  for (let d=1; d<=daysInMo; d++) {
    const isToday  = isCurMo && d===_htTOD;
    const isFuture = isCurMo && d>_htTOD;
    const k = htKey(_htCalYr, _htCalMo, d);
    const done = all[k] && all[k][habit];
    let cls = 'ht-cal-day';
    if (isFuture) cls+=' ht-cal-future';
    else { if (isToday) cls+=' ht-cal-today'; if (done) cls+=' ht-cal-done'; }
    html += '<div class="'+cls+'" data-day="'+d+'" data-habit="'+habit+'" data-yr="'+_htCalYr+'" data-mo="'+_htCalMo+'">'+d+'</div>';
  }
  html += '</div>';
  return html;
}

function htRenderList() {
  const list = document.getElementById('habit-list');
  if (!list) return;
  list.innerHTML = '';
  HT_HABITS.forEach(habit => {
    const s   = htCalcStreak(habit);
    const b   = htCalcBest(habit);
    const pct = htCalcPct(habit);
    const streakCls = s===0?' zero':s>=7?' fire':'';
    const isOpen = _htOpenRows[habit];

    const row = document.createElement('div');
    row.className = 'ht-row';
    row.id = 'ht-row-'+habit;
    row.innerHTML =
      '<div class="ht-row-inner' + (isOpen ? ' ht-open' : '') + '" id="ht-inner-' + habit + '" data-habit="' + habit + '">'
        + '<div class="ht-icon">' + htMakeIcon(habit) + '</div>'
        + '<span class="ht-row-label">' + HT_LABELS[habit] + '</span>'
        + '<div class="ht-dots" id="ht-dots-' + habit + '">' + htBuildDots(habit) + '</div>'
        + '<div class="ht-stats">'
          + '<span class="ht-streak' + streakCls + '">' + s + 'd</span>'
          + '<span class="ht-best">' + pct + '% · best ' + b + 'd</span>'
        + '</div>'
        + '<span class="ht-row-arr' + (isOpen ? ' ht-open' : '') + '" id="ht-arr-' + habit + '">▼</span>'
      + '</div>'
      + '<div class="ht-cal-drawer' + (isOpen ? ' ht-open' : '') + '" id="ht-cal-' + habit + '">'
        + '<div class="ht-cal-wrap" id="ht-calwrap-' + habit + '">' + htBuildCal(habit) + '</div>'
      + '</div>';
    // Attach row toggle via event listener, not inline onclick
    row.querySelector('[data-habit]').addEventListener('click', (function(hb){ return function(){ htToggleRow(hb); }; })(habit));
        list.appendChild(row);
  });
  htAttachDotHandlers();
  htAttachCalHandlers();
  htUpdateIcons();
}

function htAttachDotHandlers() {
  document.querySelectorAll('.ht-dot[data-habit]').forEach(dot => {
    dot.addEventListener('click', e => {
      e.stopPropagation();
      const d = parseInt(dot.dataset.day);
      const habit = dot.dataset.habit;
      if (!d || d > _htTOD) return;
      if (habit==='sleep' && d===_htTOD) {
        const yd = new Date(_htTOY, _htTOM, _htTOD-1);
        htToggleDay(yd.getFullYear(), yd.getMonth(), yd.getDate(), habit);
      } else {
        htToggleDay(_htTOY, _htTOM, d, habit);
      }
    });
  });
}

function htAttachCalHandlers() {
  document.querySelectorAll('.ht-cal-day[data-habit]').forEach(day => {
    day.addEventListener('click', e => {
      e.stopPropagation();
      const d     = parseInt(day.dataset.day);
      const yr    = parseInt(day.dataset.yr);
      const mo    = parseInt(day.dataset.mo);
      const habit = day.dataset.habit;
      const isCurMo = yr===_htTOY && mo===_htTOM;
      if (!d || (isCurMo && d>_htTOD)) return;
      if (habit==='sleep' && isCurMo && d===_htTOD) {
        const yd = new Date(_htTOY, _htTOM, _htTOD-1);
        htToggleDay(yd.getFullYear(), yd.getMonth(), yd.getDate(), habit);
      } else {
        htToggleDay(yr, mo, d, habit);
      }
    });
  });
}

function htToggleDay(yr, mo, day, habit) {
  const all = htLoadAll();
  const k = htKey(yr, mo, day);
  if (!all[k]) all[k] = {};
  all[k][habit] = !all[k][habit];
  htSaveAll(all);
  htRenderList();
  htCheckAllDone();
  if (typeof habitRender === 'function') habitRender();
}

function htToggleRow(habit) {
  _htOpenRows[habit] = !_htOpenRows[habit];
  const inner  = document.getElementById('ht-inner-'+habit);
  const cal    = document.getElementById('ht-cal-'+habit);
  const arr    = document.getElementById('ht-arr-'+habit);
  if (inner) inner.classList.toggle('ht-open', _htOpenRows[habit]);
  if (cal)   cal.classList.toggle('ht-open',   _htOpenRows[habit]);
  if (arr)   arr.classList.toggle('ht-open',   _htOpenRows[habit]);
}

function htCalMonth(dir) {
  _htCalMo += dir;
  if (_htCalMo>11) { _htCalMo=0; _htCalYr++; }
  if (_htCalMo<0)  { _htCalMo=11; _htCalYr--; }
  HT_HABITS.forEach(habit => {
    const wrap = document.getElementById('ht-calwrap-'+habit);
    if (wrap) { wrap.innerHTML = htBuildCal(habit); htAttachCalHandlers(); }
  });
}

function htUpdateIcons() {
  const all = htLoadAll();
  const k = htKey(_htTOY, _htTOM, _htTOD);
  const day = all[k] || {};
  const sq = document.getElementById('htico-focus');
  const ci = document.getElementById('htico-breathe');
  const tp = document.getElementById('htico-exercise-p');
  const dp = document.getElementById('htico-sleep-p');
  if (sq) sq.classList.toggle('done', !!day.focus);
  if (ci) ci.classList.toggle('done', !!day.breathe);
  if (tp) tp.setAttribute('fill', day.exercise ? '#D4A400' : 'none');
  if (dp) dp.setAttribute('fill', day.sleep     ? '#D4A400' : 'none');
}

function htUpdateHeaders() { htRenderList(); }

function htCheckAllDone() {
  const all = htLoadAll();
  const k = htKey(_htTOY, _htTOM, _htTOD);
  const today = all[k] || {};
  const allDone = HT_HABITS.every(h => today[h]===true);
  if (allDone && !_htAllDonePlayed) {
    _htAllDonePlayed = true;
    playClockEffect();
  }
  if (!allDone) _htAllDonePlayed = false;
}

function htRenderAll() { htRenderList(); htCheckAllDone(); }

function htUpdateTrackerIcons() { htUpdateIcons(); }

// Init
htRenderList();

// Safety net: show after 3s regardless
setTimeout(() => {
  document.getElementById('clock-body').classList.add('ready');
}, 3000);

// Init zazen preset highlight
zazenSetPreset(5);
</script>
