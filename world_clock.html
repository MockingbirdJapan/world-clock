*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --on:  #D4A400;
  --off: #181200;
  --bg:      #000;
  --bg-cell: #050505;
  --bg-hdr:  #080808;
  --border:  #151515;
  --dim:     #555;
  --muted:   #2e2e2e;
  --dst:     #4a9eff;
  --seg:     'DSEG7Bold', monospace;
  --ui:      'Courier New', Courier, monospace;
}

html, body { background:var(--bg); color:#ccc; font-family:var(--ui); min-height:100vh; }
body.fs { display:flex; flex-direction:column; }

/* ── CLOCK BODY — hidden until font confirmed loaded ── */
#clock-body { opacity:0; transition:opacity 0.15s ease; }
#clock-body.ready { opacity:1; }

/* ── TOOLBAR ── */
#toolbar { display:flex; justify-content:flex-end; align-items:center; padding:10px 20px; background:var(--bg); }
.tbtn { background:transparent; border:none; color:#333; font-family:var(--ui); font-size:16px; letter-spacing:2px; padding:4px 6px; cursor:pointer; transition:color .15s; }
.tbtn:hover { color:var(--on); }

/* ── MAIN SECTION ── */
#main-section {
  text-align:center;
  min-height: calc(100dvh - 36px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: var(--bg-hdr);
  padding: 2rem 1.5rem;
}
#main-zone { font-size:11px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; margin-bottom:5px; }
#main-city { font-size:13px; letter-spacing:2px; color:#888; margin-bottom:18px; }

/* ── SEGMENT DISPLAY ── */
.seg-wrap { position:relative; display:inline-block; line-height:1; }
.seg-ghost {
  font-family: var(--seg);
  font-weight: bold;
  color: var(--off);
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
  user-select: none;
  z-index: 0;
  white-space: nowrap;
}
.seg-lit {
  font-family: var(--seg);
  font-weight: bold;
  color: var(--on);
  position: relative;
  z-index: 1;
  white-space: nowrap;
}
#main-ghost, #main-lit {
  font-size: clamp(52px, 11vw, 92px);
  letter-spacing: 5px;
  display: block;
}

#main-date { font-size:13px; color:var(--dim); margin-top:12px; letter-spacing:2px; }
#main-dst  { font-size:10px; color:var(--dst); margin-top:4px; letter-spacing:2px; min-height:14px; }
#ntp       { font-size:9px; color:#252525; margin-top:5px; letter-spacing:1px; transition:color .5s; }
#ntp.ok    { color:#1e3a1e; }
#ntp.err   { color:#3a1e1e; }
#ntp.sync  { color:#2a2a1a; }

/* ── GRID ── */
#grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(168px,1fr)); gap:1px; background:#0a0a0a; }
.cell { background:var(--bg-cell); padding:12px 14px; cursor:pointer; transition:background .12s; position:relative; }
.cell:hover { background:#0c0900; }
.cell.active { background:#0a0700; border-top:2px solid var(--on); }
.cell.active::after { content:'▲ MAIN'; position:absolute; top:4px; right:8px; font-size:8px; color:var(--on); letter-spacing:1px; }
.cname { font-size:11px; color:#999; letter-spacing:1px; margin-bottom:1px; }
.czn   { font-size:9px;  color:var(--muted); letter-spacing:1px; margin-bottom:4px; }
.cdst  { font-size:8px;  color:var(--dst); letter-spacing:1px; min-height:10px; margin-bottom:2px; }
.wb    { font-size:8px;  color:#3a6a2a; letter-spacing:1px; margin-left:4px; }

/* Cell seg display */
.cell-seg-wrap { position:relative; display:inline-block; line-height:1; }
.cell-ghost, .cell-lit {
  font-family: var(--seg);
  font-weight: bold;
  font-size: 22px;
  letter-spacing: 2px;
  display: block;
  white-space: nowrap;
}
.cell-ghost {
  color: var(--off);
  position: absolute;
  top:0; left:0;
  pointer-events:none;
  user-select:none;
  z-index:0;
}
.cell-lit {
  color: var(--on);
  position: relative;
  z-index: 1;
}

.cdate { font-size:8px; color:var(--muted); margin-top:3px; letter-spacing:1px; }

/* ── TOGGLE BARS ── */
.toggle-bar { display:flex; justify-content:center; align-items:center; gap:8px; padding:8px; background:var(--bg); cursor:pointer; user-select:none; }
.toggle-bar:hover .toggle-lbl, .toggle-bar:hover .toggle-arr { color:#444; }
.toggle-lbl { font-size:9px; color:#2a2a2a; letter-spacing:3px; text-transform:uppercase; font-family:var(--ui); }
.toggle-arr { font-size:9px; color:#2a2a2a; transition:transform .25s; }
.toggle-arr.open { transform:rotate(180deg); }

/* ── COLLAPSIBLE SECTIONS ── */
.collapsible { overflow:hidden; transition:max-height .3s ease, opacity .3s ease; }
.collapsible.closed { max-height:0 !important; opacity:0; }

/* ── POMODORO ── */
#pomo-section { background:#060606; padding:18px 20px 16px; text-align:center; }
#pomo-header { font-size:10px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; margin-bottom:12px; }
.pomo-seg-wrap { position:relative; display:inline-block; line-height:1; margin-bottom:12px; }
.pomo-ghost { font-family:var(--seg); font-weight:bold; color:var(--off); position:absolute; top:0; left:0; pointer-events:none; user-select:none; z-index:0; white-space:nowrap; font-size:clamp(36px,6vw,58px); letter-spacing:4px; }
.pomo-lit   { font-family:var(--seg); font-weight:bold; color:var(--on); position:relative; z-index:1; white-space:nowrap; font-size:clamp(36px,6vw,58px); letter-spacing:4px; display:block; }
#pomo-dots { display:flex; justify-content:center; gap:8px; margin-bottom:12px; }
.pdot { width:7px; height:7px; border-radius:50%; background:#1a1400; border:1px solid #2a2200; flex-shrink:0; }
.pdot.done { background:var(--on); border-color:var(--on); }
#pomo-controls { display:flex; justify-content:center; gap:10px; }
.pbtn { background:transparent; border:1px solid #222; color:#555; font-family:var(--ui); font-size:10px; letter-spacing:2px; padding:5px 14px; border-radius:4px; text-transform:uppercase; cursor:pointer; transition:border-color .15s,color .15s; }
.pbtn:hover { border-color:var(--on); color:var(--on); }
.pbtn.active { border-color:var(--on); color:var(--on); }

/* ── ZAZEN ── */
#zazen-section { background:#060606; padding:18px 20px 16px; text-align:center; }
#zazen-header { font-size:10px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; margin-bottom:14px; }
.zazen-seg-wrap { position:relative; display:inline-block; line-height:1; margin-bottom:14px; }
.zazen-ghost { font-family:var(--seg); font-weight:bold; color:var(--off); position:absolute; top:0; left:0; pointer-events:none; user-select:none; z-index:0; white-space:nowrap; font-size:clamp(36px,6vw,58px); letter-spacing:4px; }
.zazen-lit   { font-family:var(--seg); font-weight:bold; color:var(--on); position:relative; z-index:1; white-space:nowrap; font-size:clamp(36px,6vw,58px); letter-spacing:4px; display:block; }
#zazen-presets { display:flex; justify-content:center; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.zpre { background:transparent; border:1px solid #222; color:#555; font-family:var(--ui); font-size:10px; letter-spacing:2px; padding:5px 12px; border-radius:4px; text-transform:uppercase; cursor:pointer; transition:border-color .15s,color .15s; }
.zpre:hover { border-color:var(--on); color:var(--on); }
.zpre.zsel { border-color:var(--on); color:var(--on); }
#zazen-custom-input { background:#0a0a0a; border:1px solid #2a2a2a; color:var(--on); font-family:var(--ui); font-size:11px; letter-spacing:2px; padding:5px 8px; border-radius:4px; width:48px; text-align:center; display:none; }
#zazen-custom-input.visible { display:inline-block; }
#zazen-custom-unit { font-size:9px; color:#333; letter-spacing:2px; text-transform:uppercase; display:none; }
#zazen-custom-unit.visible { display:inline; }
#zazen-controls { display:flex; justify-content:center; gap:10px; }
.zbtn { background:transparent; border:1px solid #222; color:#555; font-family:var(--ui); font-size:10px; letter-spacing:2px; padding:5px 14px; border-radius:4px; text-transform:uppercase; cursor:pointer; transition:border-color .15s,color .15s; }
.zbtn:hover { border-color:var(--on); color:var(--on); }
.zbtn.active { border-color:var(--on); color:var(--on); }

#footer { text-align:center; padding:10px; font-size:9px; color:#1a1a1a; letter-spacing:1px; }

body.fs #toolbar, body.fs #main-section { flex-shrink:0; }
body.fs #grid { flex:1; }
</style>
</head>
<body>

<div id="toolbar">
  <div></div>
  <button class="tbtn" id="btnfs" onclick="toggleFS()">⛶</button>
</div>

<div id="clock-body">
  <div id="main-section">
    <div id="main-zone">JST — UTC+9</div>
    <div id="main-city">Tokyo, Japan</div>
    <div class="seg-wrap">
      <span class="seg-ghost" id="main-ghost">88:88:88</span>

  <!-- Pomodoro toggle -->

    <span class="toggle-arr open" id="arr-pomo2">▼</span>
  </div>
  <div class="collapsible" id="pomo-wrap" style="max-height:300px; opacity:1;">
    <div id="pomo-section">
      <div id="pomo-header">work &nbsp;·&nbsp; session 1 of 4</div>
      <div class="pomo-seg-wrap">
        <span class="pomo-ghost">88:88</span>
        <span class="pomo-lit" id="pomo-lit">25:00</span>
      </div>
      <div id="pomo-dots"></div>
      <div id="pomo-controls">
        <button class="pbtn active" id="pbtn-start" onclick="pomoStart()">▶ start</button>
        <button class="pbtn" onclick="pomoReset()">↺ reset</button>

      </div>
    </div>
  </div>

  <!-- Zazen toggle -->
  <div class="toggle-bar" onclick="toggleSection('zazen')">
    <span class="toggle-arr open" id="arr-zazen">▼</span>
    <span class="toggle-lbl">Zazen</span>
    <span class="toggle-arr open" id="arr-zazen2">▼</span>
  </div>
  <div class="collapsible" id="zazen-wrap" style="max-height:300px; opacity:1;">
    <div id="zazen-section">
      <div id="zazen-header">meditation timer</div>
      <!-- Idle state -->
      <div id="zazen-idle">
        <div id="zazen-presets">
          <button class="zpre" onclick="zazenSetPreset(3)">3</button>
          <button class="zpre zsel" id="zpre-5" onclick="zazenSetPreset(5)">5</button>
          <button class="zpre" onclick="zazenSetPreset(10)">10</button>
          <button class="zpre" onclick="zazenSetPreset(20)">20</button>
          <button class="zpre" id="zpre-custom" onclick="zazenSetCustom()">custom</button>
          <input id="zazen-custom-input" type="number" min="1" max="999" value="5" oninput="zazenCustomChange(this.value)">
          <span id="zazen-custom-unit">min</span>
        </div>
        <div id="zazen-controls">
          <button class="zbtn active" onclick="zazenBegin()">▶ begin</button>
        </div>
      </div>
      <!-- Running state -->
      <div id="zazen-running" style="display:none;">
        <div class="zazen-seg-wrap">
          <span class="zazen-ghost">88:88</span>
          <span class="zazen-lit" id="zazen-lit">05:00</span>
        </div>
        <div id="zazen-controls-run">
          <button class="zbtn active" id="zbtn-pause" onclick="zazenPause()">⏸ pause</button>

  <!-- World times toggle -->

<script>
// ═══════════════════════════════════════════════════════
// ZONES
// ═══════════════════════════════════════════════════════
const ZONES = [
  {city:'Los Angeles', label:'PDT/PST',   tz:'America/Los_Angeles'},
  {city:'New York',    label:'EDT/EST',   tz:'America/New_York'},
  {city:'London',      label:'BST/GMT',   tz:'Europe/London'},
  {city:'Paris',       label:'CEST/CET',  tz:'Europe/Paris'},
  {city:'Dubai',       label:'GST',       tz:'Asia/Dubai'},
  {city:'Mumbai',      label:'IST',       tz:'Asia/Kolkata'},
  {city:'Bangkok',     label:'ICT',       tz:'Asia/Bangkok'},
  {city:'Beijing',     label:'CST',       tz:'Asia/Shanghai'},
  {city:'Seoul',       label:'KST',       tz:'Asia/Seoul'},
  {city:'Tokyo',       label:'JST',       tz:'Asia/Tokyo'},
  {city:'Sydney',      label:'AEDT/AEST', tz:'Australia/Sydney'},
  {city:'Auckland',    label:'NZDT/NZST', tz:'Pacific/Auckland'},
];

let mainTz = localStorage.getItem('wc_tz') || 'Asia/Tokyo';

// ═══════════════════════════════════════════════════════
// TIMEKEEPING — performance.now() + 5-sample NTP filter
// ═══════════════════════════════════════════════════════
let ntpOff = 0, perfBase = 0, dateBase = 0;
function nowMs() { return dateBase + (performance.now() - perfBase); }

async function fetchSample() {
  const t0 = performance.now(), d0 = Date.now();
  const res = await fetch('https://worldtimeapi.org/api/timezone/UTC');
  const t1 = performance.now();
  if (!res.ok) throw 0;
  const data = await res.json();
  return { offset: new Date(data.utc_datetime).getTime() - (d0 + (t1-t0)/2), rtt: t1-t0 };
}

async function ntpSync() {
  const el = document.getElementById('ntp');
  el.textContent = '◎ sampling ntp (7 probes)...'; el.className = 'sync';
  const samples = [];
  for (let i = 0; i < 7; i++) {
    try {
      samples.push(await fetchSample());
      el.textContent = `◎ sampling... ${i+1}/7`;
    } catch(e) {}
    if (i < 6) await new Promise(r => setTimeout(r, 200));
  }
  if (samples.length >= 2) {
    samples.sort((a,b) => a.rtt - b.rtt);
    const keep = samples.slice(0, Math.min(3, samples.length));
    ntpOff = keep.reduce((s,x) => s + x.offset, 0) / keep.length;
    perfBase = performance.now(); dateBase = Date.now() + ntpOff;
    el.textContent = `◆ ntp synced  ±${Math.round(keep[0].rtt/2)}ms  (${keep.length}/${samples.length} samples)`;
    el.className = 'ok';
  } else {
    perfBase = performance.now(); dateBase = Date.now();
    el.textContent = '○ ntp unavailable — using system clock'; el.className = 'err';
  }
  setTimeout(ntpSync, 5 * 60 * 1000);
}

function driftCheck() {
  if (Math.abs(nowMs() - (Date.now() + ntpOff)) > 50) {
    perfBase = performance.now(); dateBase = Date.now() + ntpOff;
  }
  setTimeout(driftCheck, 30 * 1000);
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function getOff(tz, d) {
  return Math.round((new Date(d.toLocaleString('en-US',{timeZone:tz})).getTime() - d.getTime()) / 60000);
}
function fmtOff(tz) {
  const m = getOff(tz, new Date(nowMs())), s = m>=0?'+':'-', a = Math.abs(m);
  return 'UTC' + s + Math.floor(a/60) + (a%60 ? ':' + String(a%60).padStart(2,'0') : '');
}
function isDST(tz) {
  const d = new Date(nowMs());
  const j = getOff(tz, new Date(d.getFullYear(),0,1));
  const u = getOff(tz, new Date(d.getFullYear(),6,1));
  return j !== u && getOff(tz, d) === Math.max(j, u);
}
function isWorkH(tz) {
  const h = parseInt(new Intl.DateTimeFormat('en-GB',{timeZone:tz,hour:'2-digit',hour12:false}).format(new Date(nowMs())));
  return h >= 9 && h < 18;
}
function fmtT(ms, tz) {
  return new Intl.DateTimeFormat('en-GB',{timeZone:tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date(ms));
}
function fmtD(ms, tz) {
  return new Intl.DateTimeFormat('en-GB',{timeZone:tz,weekday:'short',day:'2-digit',month:'short',year:'numeric'}).format(new Date(ms));
}

// ═══════════════════════════════════════════════════════
// BUILD GRID
// ═══════════════════════════════════════════════════════
function buildGrid() {
  const g = document.getElementById('grid'); g.innerHTML = '';
  ZONES.forEach(z => {
    const k = z.tz.replace(/\//g,'_');
    const cell = document.createElement('div');
    cell.className = 'cell' + (z.tz === mainTz ? ' active' : '');
    cell.id = 'cell-' + k;

    const nr = document.createElement('div'); nr.className = 'cname'; nr.textContent = z.city;
    const wb = document.createElement('span'); wb.className = 'wb'; wb.id = 'wb-'+k; nr.appendChild(wb);
    const zr = document.createElement('div'); zr.className = 'czn'; zr.id = 'lbl-'+k; zr.textContent = z.label;
    const dr = document.createElement('div'); dr.className = 'cdst'; dr.id = 'dst-'+k;

    const sw = document.createElement('div'); sw.className = 'cell-seg-wrap';
    const gh = document.createElement('span'); gh.className = 'cell-ghost'; gh.textContent = '88:88:88';
    const li = document.createElement('span'); li.className = 'cell-lit'; li.id = 't-'+k; li.textContent = '--:--:--';
    sw.appendChild(gh); sw.appendChild(li);

    const dt = document.createElement('div'); dt.className = 'cdate'; dt.id = 'dat-'+k;

    [nr,zr,dr,sw,dt].forEach(x => cell.appendChild(x));
    cell.addEventListener('click', () => setMain(z));
    g.appendChild(cell);
  });
}

function setMain(z) {
  mainTz = z.tz;
  localStorage.setItem('wc_tz', z.tz);
  document.getElementById('main-zone').textContent = z.label + ' — ' + fmtOff(z.tz);
  document.getElementById('main-city').textContent = z.city;
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
  document.getElementById('cell-' + z.tz.replace(/\//g,'_')).classList.add('active');
}

// ═══════════════════════════════════════════════════════
// FULLSCREEN
// ═══════════════════════════════════════════════════════
function toggleFS() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    document.body.classList.add('fs');
    document.getElementById('btnfs').textContent = '✕';
  } else {
    document.exitFullscreen();
    document.body.classList.remove('fs');
    document.getElementById('btnfs').textContent = '⛶';
  }
}
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    document.body.classList.remove('fs');
    document.getElementById('btnfs').textContent = '⛶';
  }
});

// ═══════════════════════════════════════════════════════
// TICK — performance.now() based, no drift
// ═══════════════════════════════════════════════════════
function tick() {
  const ms = nowMs();
  document.getElementById('main-lit').textContent  = fmtT(ms, mainTz);
  document.getElementById('main-date').textContent = fmtD(ms, mainTz);
  document.getElementById('main-dst').textContent  = isDST(mainTz) ? '◆ DAYLIGHT SAVING TIME ACTIVE' : '';
  ZONES.forEach(z => {
    const k = z.tz.replace(/\//g,'_');
    document.getElementById('t-'   + k).textContent = fmtT(ms, z.tz);
    document.getElementById('dat-' + k).textContent = fmtD(ms, z.tz);
    document.getElementById('dst-' + k).textContent = isDST(z.tz) ? '◆ DST' : '';
    document.getElementById('lbl-' + k).textContent = z.label + '  ' + fmtOff(z.tz);
    document.getElementById('wb-'  + k).textContent = '';
  });
}
function sched() {
  tick();
  setTimeout(sched, 1000 - (nowMs() % 1000));
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
perfBase = performance.now(); dateBase = Date.now();

buildGrid();

// Update main header to persisted zone — called after perfBase set so fmtOff works
const z0 = ZONES.find(z => z.tz === mainTz) || ZONES[9];
document.getElementById('main-zone').textContent = z0.label + ' — ' + fmtOff(z0.tz);
document.getElementById('main-city').textContent = z0.city;

// Tick starts immediately — clock updates even while hidden
sched();
ntpSync();
driftCheck();

// Show clock only after DSEG7Bold is confirmed loaded — prevents any fallback flash
document.fonts.load('bold 92px DSEG7Bold').then(() => {
  document.getElementById('clock-body').classList.add('ready');
}).catch(() => {
  document.getElementById('clock-body').classList.add('ready');
});

// ═══════════════════════════════════════════════════════
// SECTION TOGGLES
// ═══════════════════════════════════════════════════════
const sectionState = { pomo: true, zazen: true, grid: true };
function toggleSection(id) {
  sectionState[id] = !sectionState[id];
  const ids = { pomo:'pomo-wrap', zazen:'zazen-wrap', grid:'grid-wrap' };
  const heights = { pomo:'300px', zazen:'300px', grid:'2000px' };
  const wrap = document.getElementById(ids[id]);
  const open = sectionState[id];
  if (open) {
    wrap.classList.remove('closed');
    wrap.style.maxHeight = heights[id];
    wrap.style.opacity = '1';
  } else {
    wrap.style.maxHeight = '0';
    wrap.style.opacity = '0';
    wrap.classList.add('closed');
  }
  ['arr-'+id, 'arr-'+id+'2'].forEach(aid => {
    const el = document.getElementById(aid);
    if (el) el.classList.toggle('open', open);
  });
}

// ═══════════════════════════════════════════════════════
// POMODORO ENGINE
// ═══════════════════════════════════════════════════════
const POMO_WORK  = 25 * 60;
const POMO_SHORT =  5 * 60;
const POMO_LONG  = 15 * 60;

let pomoState    = 'idle';   // idle | running | paused
let pomoMode     = 'work';   // work | short | long
let pomoCycle    = 0;        // 0-3 completed work sessions
let pomoLeft     = POMO_WORK;
let pomoInterval = null;

function pomoModeLabel() {
  if (pomoMode === 'work')  return `work &nbsp;·&nbsp; session ${pomoCycle + 1} of 4`;
  if (pomoMode === 'short') return 'short break';
  return 'long break';
}

function pomoDuration() {
  if (pomoMode === 'work')  return POMO_WORK;
  if (pomoMode === 'short') return POMO_SHORT;
  return POMO_LONG;
}

function pomoFmt(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function pomoRenderDots() {
  const el = document.getElementById('pomo-dots');
  el.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const d = document.createElement('div');
    d.className = 'pdot' + (i < pomoCycle ? ' done' : '');
    el.appendChild(d);
  }
}

function pomoRender() {
  document.getElementById('pomo-lit').textContent = pomoFmt(pomoLeft);
  document.getElementById('pomo-header').innerHTML = pomoModeLabel();
  pomoRenderDots();
  const btn = document.getElementById('pbtn-start');
  if (pomoState === 'running') {
    btn.textContent = '⏸ pause'; btn.classList.add('active');
  } else {
    btn.textContent = '▶ start'; btn.classList.add('active');
  }
}

function pomoTick() {
  if (pomoLeft <= 0) {
    clearInterval(pomoInterval); pomoInterval = null;
    pomoState = 'idle';
    playGong();
    // Advance state — wait for user to press start
    if (pomoMode === 'work') {
      pomoCycle++;
      pomoMode = pomoCycle >= 4 ? 'long' : 'short';
      if (pomoCycle >= 4) pomoCycle = 0; // reset after long break cycle
    } else {
      pomoMode = 'work';
    }
    pomoLeft = pomoDuration();
    pomoRender();
    return;
  }
  pomoLeft--;
  pomoRender();
}

function pomoStart() {
  if (pomoState === 'running') {
    // Pause
    clearInterval(pomoInterval); pomoInterval = null;
    pomoState = 'paused';
  } else {
    // Start fresh session or resume — gong only on fresh start
    if (pomoState === 'idle') playGong();
    pomoState = 'running';
    pomoInterval = setInterval(pomoTick, 1000);
  }
  pomoRender();
}

function pomoReset() {
  clearInterval(pomoInterval); pomoInterval = null;
  pomoState = 'idle';
  pomoMode  = 'work';
  pomoCycle = 0;
  pomoLeft  = POMO_WORK;
  pomoRender();
}

function pomoSkip() {
  clearInterval(pomoInterval); pomoInterval = null;
  pomoState = 'idle';
  if (pomoMode === 'work') {
    pomoCycle = Math.min(pomoCycle + 1, 4);
    pomoMode = pomoCycle >= 4 ? 'long' : 'short';
    if (pomoCycle >= 4) pomoCycle = 0;
  } else {
    pomoMode = 'work';
  }
  pomoLeft = pomoDuration();
  playGong();
  pomoRender();
}

// ── ZAZEN BOWL GONG — iOS compatible ───────────────────
// AudioContext must be created on a user gesture on iOS.
// We create it on first tap and keep it alive, resuming before each play.
let _audioCtx = null;

function getAudioCtx() {
  if (!_audioCtx) {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return _audioCtx;
}

// Prime the audio context on first user interaction anywhere on the page
function primeAudio() {
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
  } catch(e) {}
}
document.addEventListener('touchstart', primeAudio, { once: false, passive: true });
document.addEventListener('click', primeAudio, { once: false, passive: true });

function playGong() {
  try {
    const ctx = getAudioCtx();
    // Resume context (iOS suspends it after inactivity)
    const doPlay = () => {
      const t = ctx.currentTime;
      [110, 110.4, 303.6, 551.2, 880].forEach((f, i) => {
        const g = [0.5, 0.3, 0.18, 0.08, 0.03][i];
        const osc = ctx.createOscillator();
        const env = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        env.gain.setValueAtTime(0, t);
        env.gain.linearRampToValueAtTime(g, t + 0.01);
        env.gain.exponentialRampToValueAtTime(0.0001, t + 8);
        osc.connect(env);
        env.connect(ctx.destination);
        osc.start(t);
        osc.stop(t + 8);
      });
    };
    if (ctx.state === 'suspended') {
      ctx.resume().then(doPlay);
    } else {
      doPlay();
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════
// ZAZEN ENGINE
// ═══════════════════════════════════════════════════════
let zazenMins     = 5;
let zazenLeft     = 5 * 60;
let zazenState    = 'idle';   // idle | running | paused
let zazenInterval = null;
let zazenCustomMode = false;

function zazenSetPreset(mins) {
  zazenMins = mins; zazenLeft = mins * 60; zazenCustomMode = false;
  document.querySelectorAll('.zpre').forEach(b => b.classList.remove('zsel'));
  // Highlight correct preset button by text content
  document.querySelectorAll('.zpre').forEach(b => {
    if (b.textContent === String(mins)) b.classList.add('zsel');
  });
  document.getElementById('zpre-custom').classList.remove('zsel');
  document.getElementById('zazen-custom-input').classList.remove('visible');
  document.getElementById('zazen-custom-unit').classList.remove('visible');
  zazenRenderIdle();
}

function zazenSetCustom() {
  zazenCustomMode = true;
  document.querySelectorAll('.zpre').forEach(b => b.classList.remove('zsel'));
  document.getElementById('zpre-custom').classList.add('zsel');
  const inp = document.getElementById('zazen-custom-input');
  inp.classList.add('visible');
  inp.value = zazenMins;
  document.getElementById('zazen-custom-unit').classList.add('visible');
  inp.focus();
}

function zazenCustomChange(val) {
  const v = parseInt(val);
  if (v > 0 && v <= 999) { zazenMins = v; zazenLeft = v * 60; }
}

function zazenFmt(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function zazenRenderIdle() {
  // Nothing dynamic needed — idle state is always reset to full duration
}

function zazenBegin() {
  // Read custom input value if in custom mode
  if (zazenCustomMode) {
    const v = parseInt(document.getElementById('zazen-custom-input').value);
    if (v > 0 && v <= 999) { zazenMins = v; zazenLeft = v * 60; }
  }
  document.getElementById('zazen-idle').style.display = 'none';
  document.getElementById('zazen-running').style.display = 'block';
  document.getElementById('zazen-header').textContent = 'meditation timer · ' + zazenMins + ' min';
  document.getElementById('zazen-lit').textContent = zazenFmt(zazenLeft);
  zazenState = 'running';
  playGong();
  zazenInterval = setInterval(zazenTick, 1000);
  // Expand wrap height to fit running state
  document.getElementById('zazen-wrap').style.maxHeight = '260px';
}

function zazenTick() {
  if (zazenLeft <= 0) {
    clearInterval(zazenInterval); zazenInterval = null;
    zazenState = 'idle';
    document.getElementById('zazen-lit').textContent = '00:00';
    playGong();
    return;
  }
  zazenLeft--;
  document.getElementById('zazen-lit').textContent = zazenFmt(zazenLeft);
}

function zazenPause() {
  if (zazenState === 'running') {
    clearInterval(zazenInterval); zazenInterval = null;
    zazenState = 'paused';
    document.getElementById('zbtn-pause').textContent = '▶ resume';
  } else {
    zazenState = 'running';
    zazenInterval = setInterval(zazenTick, 1000);
    document.getElementById('zbtn-pause').textContent = '⏸ pause';
  }
}

function zazenReset() {
  clearInterval(zazenInterval); zazenInterval = null;
  zazenState = 'idle';
  zazenLeft = zazenMins * 60;
  document.getElementById('zazen-running').style.display = 'none';
  document.getElementById('zazen-idle').style.display = 'block';
  document.getElementById('zazen-header').textContent = 'meditation timer';
  document.getElementById('zbtn-pause').textContent = '⏸ pause';
  document.getElementById('zazen-wrap').style.maxHeight = '300px';
}

// Safety net: show after 3s regardless
setTimeout(() => {
  document.getElementById('clock-body').classList.add('ready');
}, 3000);
</script>
